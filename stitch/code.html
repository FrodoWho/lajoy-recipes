<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Work+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#f9e076",
              "tertiary": "#635e53",
              "surface-dim": "#dfd9d2",
              "inverse-on-surface": "#f6f0e8",
              "on-primary-fixed-variant": "#534600",
              "on-background": "#1d1b17",
              "surface": "#fff8f1",
              "tertiary-container": "#e7e0d1",
              "primary-fixed-dim": "#dec65f",
              "on-secondary-fixed-variant": "#503d73",
              "inverse-surface": "#33302b",
              "on-error-container": "#93000a",
              "on-secondary-container": "#5d4a82",
              "tertiary-fixed-dim": "#cdc6b8",
              "tertiary-fixed": "#e9e2d3",
              "on-tertiary": "#ffffff",
              "secondary-container": "#d6beff",
              "secondary-fixed": "#ebdcff",
              "surface-container": "#f3ede6",
              "primary": "#6e5d00",
              "background": "#fff8f1",
              "on-tertiary-fixed-variant": "#4b463c",
              "primary-fixed": "#fbe278",
              "surface-container-high": "#eee7e0",
              "outline": "#7d7765",
              "surface-variant": "#e8e1da",
              "outline-variant": "#cec6b2",
              "on-secondary": "#ffffff",
              "on-tertiary-container": "#686357",
              "on-primary-fixed": "#221b00",
              "secondary": "#68548d",
              "on-error": "#ffffff",
              "on-primary-container": "#746200",
              "surface-container-low": "#f9f3eb",
              "on-surface-variant": "#4b4737",
              "secondary-fixed-dim": "#d3bcfc",
              "on-secondary-fixed": "#230f45",
              "on-tertiary-fixed": "#1e1b13",
              "surface-tint": "#6e5d00",
              "surface-container-highest": "#e8e1da",
              "error": "#ba1a1a",
              "surface-bright": "#fff8f1",
              "inverse-primary": "#dec65f",
              "on-primary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#1d1b17",
              "error-container": "#ffdad6"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Noto Serif"],
              "label": ["Work Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(24px);
            background-color: rgba(232, 225, 218, 0.7);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-6 md:p-12 lg:p-20">
<div class="max-w-6xl w-full grid grid-cols-1 md:grid-cols-2 gap-0 overflow-hidden bg-surface-container-low rounded-xl shadow-sm">
<!-- Left Side: Aesthetic Imagery (Atelier Folio Style) -->
<div class="hidden md:block relative bg-primary-container overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-primary-container to-surface opacity-40"></div>
<div class="relative h-full w-full p-12 flex flex-col justify-between z-10">
<div>
<h1 class="font-headline text-display-lg text-primary text-5xl font-bold leading-tight tracking-tight italic">Lajoy's<br/>Recipes</h1>
<p class="mt-6 font-body text-on-primary-container text-lg max-w-xs leading-relaxed">
                            Step into a curated hearth of culinary inspiration and artisanal recipes.
                        </p>
</div>
<!-- Asymmetric Image Crop -->
<div class="relative mt-8">
<img alt="Cozy sunlit kitchen scene" class="w-full h-80 object-cover rounded-tl-xl rounded-br-none rounded-tr-none rounded-bl-none shadow-lg transform translate-x-12 translate-y-12 rotate-2 scale-110" data-alt="A warm sunlit kitchen with rustic wooden counters" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDony7RLVi6-0EDGclkfWXfroehvCpEwJn4QnjjcoYF-dpo7P3ThF-4AO_K1R8T0eIhApZX1gBjOwv5UCU8wh_CWEwunyf8tClcaisXEFiadlMnI2qajpbgPBMj5n7KGsV1Brunc9NanaRlKeg8rmvr7A0jnRaTkTk21QWHa4rVkDsuLShBizGnlCCYCRqbte9wxH60C5kmS3Zo2s0FTNy9vBvfuYdvnoVlI7FU2adyrm_Jae7Oxp-0lAkwljMwib_HOGcB0izRqz0_"/>
</div>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="p-8 md:p-16 lg:p-24 flex flex-col justify-center bg-surface">
<div class="max-w-sm mx-auto w-full">
<header class="mb-12">
<span class="font-label text-label-md text-secondary tracking-widest uppercase mb-2 block">Welcome Back</span>
<h2 class="font-headline text-headline-lg text-on-surface text-3xl font-medium">Sign in to Lajoy's Recipes</h2>
</header>
<form class="space-y-6">
<div class="space-y-1">
<label class="font-label text-label-md text-on-surface-variant block ml-1" for="email">Email Address</label>
<input class="w-full px-4 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 outline-none" id="email" name="email" placeholder="chef@lajoys.com" type="email"/>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="font-label text-label-md text-on-surface-variant block ml-1" for="password">Password</label>
<a class="font-label text-xs text-secondary hover:underline underline-offset-4" href="#">Forgot?</a>
</div>
<input class="w-full px-4 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-label font-semibold rounded-full hover:opacity-90 active:scale-[0.98] transition-all shadow-md mt-4" type="submit">
                            Sign In
                        </button>
</form>
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant opacity-30"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-tighter">
<span class="bg-surface px-4 text-on-surface-variant font-label">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low border border-outline-variant border-opacity-20 rounded-full hover:bg-secondary-container transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-secondary-container" data-icon="google">google</span>
<span class="font-label text-sm font-medium text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low border border-outline-variant border-opacity-20 rounded-full hover:bg-secondary-container transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-secondary-container" data-icon="apple">ios</span>
<span class="font-label text-sm font-medium text-on-surface">Apple</span>
</button>
</div>
<p class="mt-12 text-center font-body text-sm text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-secondary font-semibold hover:underline underline-offset-4 decoration-primary-container decoration-4" href="#">Create one here</a>
</p>
</div>
</div>
</div>
</main>
<!-- Footer - Using Shared Component Logic -->
<footer class="w-full py-16 mt-auto bg-surface-container-low border-t border-outline-variant border-opacity-20">
<div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto gap-8">
<div class="text-center md:text-left">
<span class="font-headline italic text-on-surface text-xl mb-2 block">Lajoy's Recipes</span>
<p class="font-label text-xs tracking-widest uppercase text-on-surface-variant opacity-70">© 2024 Lajoy's Recipes. Crafted with love.</p>
</div>
<div class="flex gap-8">
<a class="font-label text-xs tracking-widest uppercase text-on-surface-variant hover:text-secondary transition-all underline decoration-primary-container decoration-0 hover:decoration-2 underline-offset-8" href="#">Privacy</a>
<a class="font-label text-xs tracking-widest uppercase text-on-surface-variant hover:text-secondary transition-all underline decoration-primary-container decoration-0 hover:decoration-2 underline-offset-8" href="#">Security</a>
<a class="font-label text-xs tracking-widest uppercase text-on-surface-variant hover:text-secondary transition-all underline decoration-primary-container decoration-0 hover:decoration-2 underline-offset-8" href="#">Support</a>
</div>
</div>
</footer>
</body></html>
