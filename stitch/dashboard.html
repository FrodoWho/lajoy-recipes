<!-- Lajoy's Recipes - Dashboard -->
<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lajoy's Recipes | Recipe Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#f9e076",
              "tertiary": "#635e53",
              "surface-dim": "#dfd9d2",

              "on-background": "#1d1b17",

              "on-secondary-fixed-variant": "#503d73",
              "inverse-surface": "#33302b",
              "on-error-container": "#93000a",
              "on-secondary-container": "#5d4a82",

              "tertiary-fixed": "#e9e2d3",
              "on-tertiary": "#ffffff",
              "secondary-container": "#d6beff",
              "secondary-fixed": "#ebdcff",
              "surface-container": "#f3ede6",
              "primary": "#6e5d00",
              "background": "#fff8f1",
              "on-tertiary-fixed-variant": "#4b463c",
              "primary-fixed": "#fbe278",
              "surface-container-high": "#eee7e0",
              "outline": "#7d7765",
              "surface-variant": "#e8e1da",
              "outline-variant": "#cec6b2",
              "on-secondary": "#ffffff",
              "on-tertiary-container": "#686357",
              "on-primary-fixed": "#221b00",
              "secondary": "#68548d",
              "on-error": "#ffffff",

              "on-primary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#1d1b17",
              "error-container": "#ffdad6"

            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Noto Serif"],
              "label": ["Work Sans"]

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

        },

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopNavBar -->
<nav class="fixed top-0 w-full z-50 bg-[#fff8f1]/70 backdrop-blur-xl shadow-sm">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="text-2xl font-serif italic text-[#6e5d00]">Lajoy's Recipes</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-stone-500 hover:text-[#68548d] transition-colors duration-300" href="#">Dashboard</a>
<a class="text-[#6e5d00] font-semibold border-b-2 border-[#6e5d00] pb-1" href="#">Recipes</a>
<a class="text-stone-500 hover:text-[#68548d] transition-colors duration-300" href="#">Favorites</a>
</div>
<div class="flex items-center gap-4">
<div class="relative hidden sm:block">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="bg-surface-container-highest rounded-full py-2 pl-10 pr-4 text-sm border-none focus:ring-2 focus:ring-primary w-64 font-label" placeholder="Search culinary inspiration..." type="text"/>
</div>
<button class="p-2 rounded-full hover:bg-[#f9e076]/10 transition-colors">
<span class="material-symbols-outlined text-[#6e5d00]">account_circle</span>
</button>
</div>
</div>
</nav>
<main class="pt-28 pb-20 px-6 max-w-7xl mx-auto w-full">
<header class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
<div class="space-y-2">
<span class="label-md font-label text-secondary tracking-widest uppercase">Your Curated Collection</span>
<h1 class="text-5xl md:text-6xl font-headline font-bold text-on-surface tracking-tight">My Recipes</h1>
</div>
<div class="flex gap-12 items-center">
<div class="text-center">
<p class="text-3xl font-headline font-bold text-primary">48</p>
<p class="font-label text-xs uppercase tracking-widest text-outline">Total Recipes</p>
</div>
<div class="text-center border-l border-outline-variant/20 pl-12">
<p class="text-3xl font-headline font-bold text-secondary">12</p>
<p class="font-label text-xs uppercase tracking-widest text-outline">Favorites</p>
</div>
<button class="bg-primary text-on-primary px-8 py-4 rounded-full font-label font-medium flex items-center gap-2 hover:opacity-90 transition-all active:scale-95 shadow-lg shadow-primary/10">
<span class="material-symbols-outlined">add</span>
                    Add New Recipe
                </button>
</div>
</header>
<section class="mb-12 flex flex-wrap gap-3">
<button class="bg-primary-container text-on-primary-container px-6 py-2 rounded-full font-label text-sm font-semibold transition-colors">All</button>
<button class="bg-surface-container-highest text-on-surface-variant px-6 py-2 rounded-full font-label text-sm hover:bg-secondary-container/30 transition-colors">Breakfast</button>
<button class="bg-surface-container-highest text-on-surface-variant px-6 py-2 rounded-full font-label text-sm hover:bg-secondary-container/30 transition-colors">Main Course</button>
<button class="bg-surface-container-highest text-on-surface-variant px-6 py-2 rounded-full font-label text-sm hover:bg-secondary-container/30 transition-colors">Pastries</button>
<button class="bg-surface-container-highest text-on-surface-variant px-6 py-2 rounded-full font-label text-sm hover:bg-secondary-container/30 transition-colors">Beverages</button>
<button class="bg-surface-container-highest text-on-surface-variant px-6 py-2 rounded-full font-label text-sm hover:bg-secondary-container/30 transition-colors">Quick Meals</button>
</section>
<section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
<!-- Cards omitted for brevity - see full HTML -->
</section>
</main>
